vegetation:
  management:
    api:
      # Server Configuration
      server:
        port: 8081
        host: "0.0.0.0"
        context-path: "/api/v1"
      
      # Hugging Face Configuration
      huggingface:
        api:
          token: "${HUGGINGFACE_API_TOKEN:}"
          base_url: "https://api-inference.huggingface.co"
          timeout: 30000
        models:
          vegetation_health: "microsoft/DinoV2"
          species_detection: "facebook/detr-resnet-50"
          segmentation: "facebook/mask2former-swin-base-coco-instance"
          image_classification: "google/vit-base-patch16-224"
        
      # Processing Configuration
      processing:
        max_image_size: 10485760  # 10MB
        supported_formats: ["jpg", "jpeg", "png", "bmp", "tiff"]
        temp_directory: "/tmp/vegetation-images"
        cleanup_temp_files: true
        max_processing_time: 60000  # 60 seconds
        
      # Analysis Configuration
      analysis:
        confidence_threshold: 0.7
        max_species_results: 10
        coverage_analysis:
          min_segment_size: 100
          vegetation_classes: ["plant", "tree", "grass", "flower", "leaf"]
        health_scoring:
          weights:
            color_analysis: 0.3
            structure_analysis: 0.4
            disease_detection: 0.3
        risk_assessment:
          factors:
            - "vegetation_health"
            - "coverage_percentage"
            - "species_diversity"
            - "environmental_conditions"
          
      # Caching Configuration
      cache:
        enabled: true
        ttl: 3600  # 1 hour
        max_entries: 1000
        
      # Monitoring Configuration
      monitoring:
        metrics_enabled: true
        health_check_interval: 30000
        performance_logging: true
        
      # Security Configuration
      security:
        cors:
          enabled: true
          allowed_origins: ["*"]
          allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          allowed_headers: ["*"]
        rate_limiting:
          enabled: true
          requests_per_minute: 60
          
      # Error Handling
      error_handling:
        include_stack_trace: false
        log_errors: true
        custom_error_messages:
          validation_error: "Invalid request format or missing required fields"
          processing_error: "Failed to process vegetation analysis"
          model_error: "Machine learning model unavailable"
          timeout_error: "Request processing timeout"